# If this name is unavailable in your Fly organization, create a unique app name
# and update this field before the first deploy.
app = "mulberry-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ALLOW_DEV_GOOGLE_TOKENS = "false"

[deploy]
  strategy = "rolling"
  max_unavailable = 1
  wait_timeout = "10m"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    protocol = "http"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
